name: Build and push Docker images

on:
  release:
    types:
      - published

env:
  IMAGE_PREFIX: ghcr.io/strieflinger

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - arch: aarch64
            build_from: ghcr.io/home-assistant/aarch64-base-debian:bookworm
            platform: linux/arm64
          - arch: amd64
            build_from: ghcr.io/home-assistant/amd64-base-debian:bookworm
            platform: linux/amd64
          - arch: armhf
            build_from: ghcr.io/home-assistant/armhf-base-debian:bookworm
            platform: linux/arm/v6
          - arch: armv7
            build_from: ghcr.io/home-assistant/armv7-base-debian:bookworm
            platform: linux/arm/v7

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Log in to ghcr.io
        uses: docker/login-action@v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from release tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v7.0.0
        with:
          context: knxd
          platforms: ${{ matrix.platform }}
          build-args: BUILD_FROM=${{ matrix.build_from }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.arch }}-addon-knxd:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.arch }}-addon-knxd:latest
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
